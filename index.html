  header, main, nav{ position:relative; z-index:1; }
  header{
    padding:calc(env(safe-area-inset-top) + 18px) 20px 14px;
    border-bottom:1px solid var(--border);
    flex-shrink:0;
    position:relative;
  }
  header .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--gold);
  }
  header h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:26px;
    margin:2px 0 0;
    letter-spacing:0.01em;
  }
  header h1 em{
    font-style:italic;
    font-weight:500;
    color:var(--sand-dim);
  }
  main{
    flex:1;
    overflow-y:auto;
    padding:16px 16px calc(90px + env(safe-area-inset-bottom));
  }
  .section-title{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--sand-dim);
    margin:22px 4px 10px;
  }
  .section-title:first-child{margin-top:4px;}

  /* Stamp badge — signature element */
  .stamp{
    width:46px;height:46px;
    border-radius:50%;
    border:1.5px dashed var(--border-strong);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    background:var(--bg-elev2);
    color:var(--gold);
    transform:rotate(-4deg);
    font-size:20px;
    line-height:1;
  }
  .stamp svg{width:22px;height:22px;stroke:currentColor;}
  .stamp.sm{width:34px;height:34px;font-size:15px;}
  .stamp.sm svg{width:16px;height:16px;}

  .totals-strip{
    display:flex;gap:8px;flex-wrap:wrap;
  }
  .pill{
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    padding:8px 12px;
    border-radius:100px;
    background:var(--bg-elev);
    border:1px solid var(--border);
    color:var(--sand);
  }
  .pill b{color:var(--gold);font-weight:600;}

  .card{

  .seg{display:flex;border:1px solid var(--border-strong);border-radius:10px;overflow:hidden;}

  .save-btn{

    font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--sand-dim);

  nav{
    position:absolute;bottom:0;left:0;right:0;

  #nav-handle{

  #fab-add{
    position:absolute;right:16px;bottom:calc(78px + env(safe-area-inset-bottom));

    font-family:'Fraunces',serif;font-size:28px;line-height:1;
    display:flex;align-items:center;justify-content:center;

    z-index:21;
    transition:transform .2s ease, bottom .32s cubic-bezier(.4,0,.2,1);
  }
  #fab-add:active{transform:scale(.92);}
  nav.nav-hidden ~ #fab-add{bottom:calc(24px + env(safe-area-inset-bottom));}

  /* Reise-Cockpit, Budget & Datensicherung */
  .trip-hero{background:linear-gradient(135deg,rgba(201,154,70,.18),rgba(168,84,46,.12));border:1px solid var(--border-strong);border-radius:18px;padding:18px;margin-bottom:12px}
  .trip-hero h2{font-family:'Fraunces',serif;font-size:22px;margin:0 0 4px}
  .trip-hero .route{color:var(--sand-dim);font-size:12px}
  .count-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px}
  .count-box{background:rgba(23,19,16,.55);border:1px solid var(--border);border-radius:12px;padding:12px 6px;text-align:center}
  .count-box b{display:block;color:var(--gold);font-family:'IBM Plex Mono',monospace;font-size:20px}
  .count-box span{font-size:10px;color:var(--sand-dim);text-transform:uppercase;letter-spacing:.06em}
  .budget-row{padding:10px 2px;border-top:1px solid var(--border)}
  .budget-row:first-child{border-top:none}
  .budget-head{display:flex;justify-content:space-between;gap:10px;font-size:13px}
  .budget-head b{color:var(--gold);font-family:'IBM Plex Mono',monospace}
  .progress{height:8px;background:var(--bg-elev2);border:1px solid var(--border);border-radius:99px;overflow:hidden;margin:8px 0 5px}
  .progress i{display:block;height:100%;background:var(--gold);border-radius:99px}
  .budget-meta{display:flex;justify-content:space-between;color:var(--sand-dim);font-size:10.5px;font-family:'IBM Plex Mono',monospace}
  .tool-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .tool-btn{border:1px solid var(--border-strong);background:var(--bg-elev2);color:var(--sand);border-radius:11px;padding:12px 8px;font-family:'Inter',sans-serif;font-weight:600}
  .tool-btn.danger{color:#e49b91}
  .budget-inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .budget-inputs label{font-size:10px;color:var(--sand-dim);font-family:'IBM Plex Mono',monospace}
  .budget-inputs input{margin-top:5px;width:100%;background:var(--bg-elev2);border:1px solid var(--border-strong);color:var(--sand);border-radius:9px;padding:10px}








  .final-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(201,154,70,.14);border:1px solid var(--border-strong);color:var(--gold);border-radius:99px;padding:6px 10px;font-size:10px;font-family:'IBM Plex Mono',monospace;margin-bottom:10px}
  .check-row{display:flex;align-items:center;gap:10px;padding:11px 2px;border-bottom:1px solid var(--border)}
  .check-row:last-child{border-bottom:none}.check-row.done .check-text{text-decoration:line-through;opacity:.55}
  .check-toggle{width:25px;height:25px;border-radius:8px;border:1px solid var(--border-strong);background:var(--bg-elev2);color:var(--gold);font-weight:700}
  .check-text{flex:1;font-size:13px}.check-cat{font-size:9px;color:var(--sand-dim);text-transform:uppercase;letter-spacing:.06em}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
  .stat-card{background:var(--bg-elev2);border:1px solid var(--border);border-radius:12px;padding:13px}

  .stat-card span{font-size:10px;color:var(--sand-dim)}
  .rank-row{margin:12px 0}.rank-head{display:flex;justify-content:space-between;font-size:12px;gap:8px}.rank-head b{color:var(--gold);font-family:'IBM Plex Mono',monospace}
  .trip-entry{display:flex;gap:11px;align-items:flex-start;padding:12px 2px;border-bottom:1px solid var(--border)}
  .trip-entry:last-child{border-bottom:none}

  .trip-date b{display:block;color:var(--gold);font-size:18px;font-family:'IBM Plex Mono',monospace}
  .trip-date span{font-size:9px;color:var(--sand-dim);text-transform:uppercase}
  .trip-entry .meta{flex:1;min-width:0}.trip-entry .desc{font-weight:600}.trip-entry .sub{font-size:11px;color:var(--sand-dim);margin-top:3px;line-height:1.4}
  .wild-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}

  .wild-photo{width:52px;height:52px;border-radius:9px;object-fit:cover;border:1px solid var(--border-strong)}
  .wild-photo-wrap{position:relative;width:52px;height:52px;flex-shrink:0}
  .wild-photo-del{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--red);color:#fff;border:2px solid var(--bg);font-size:11px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0;cursor:pointer}
  .fuel-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}

  .fuel-stat{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}

  .hint-box{font-size:11.5px;color:var(--sand-dim);line-height:1.45;margin-top:9px}
  .receipt-box{border:1px dashed var(--border-strong);border-radius:12px;padding:12px;text-align:center;background:var(--bg-elev2)}
  .receipt-box input{display:none}
  .receipt-actions{display:flex;gap:8px;justify-content:center}
  .receipt-btn{border:1px solid var(--border-strong);background:var(--bg);color:var(--sand);border-radius:9px;padding:10px 12px;font-weight:600}

  .receipt-preview img{width:100%;max-height:240px;object-fit:contain;border-radius:10px;background:#0d0b09}
  .receipt-badge{font-size:10px;color:var(--gold);font-family:'IBM Plex Mono',monospace;margin-top:4px}
  .receipt-thumb{width:34px;height:34px;border-radius:7px;object-fit:cover;border:1px solid var(--border-strong);flex-shrink:0}
  .toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%);background:var(--sand);color:var(--bg);padding:10px 14px;border-radius:99px;font-size:12px;font-weight:600;z-index:20;box-shadow:0 8px 30px rgba(0,0,0,.35)}


  button,input,select{font-size:16px}
  button{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  input,select{min-height:44px}
  .save-btn,.tool-btn,.receipt-btn{min-height:46px}
  .app{padding-bottom:calc(92px + env(safe-area-inset-bottom))}
  .bottom-nav{padding-bottom:max(8px,env(safe-area-inset-bottom))}
  @media(max-width:390px){
    .nav-label{font-size:8px}

    .wild-grid{grid-template-columns:repeat(3,1fr)}
  }
  @media print{
    .bottom-nav,.save-btn,.tool-btn,.del-btn,.receipt-actions{display:none!important}
    body{background:#fff;color:#111}
    .card,.trip-hero{break-inside:avoid;border:1px solid #bbb;background:#fff;color:#111}
  }
  ::-webkit-scrollbar{display:none;}

    return Math.ceil((new Date(b+'T00:00:00') - new Date(a+'T00:00:00'))/one);
  }
  function todayISO(){ return new Date().toISOString().slice(0,10); }
  function showToast(msg){
    var old=document.querySelector('.toast'); if(old) old.remove();
    var t=document.createElement('div'); t.className='toast'; t.textContent=msg;
    document.body.appendChild(t); setTimeout(function(){t.remove();},2200);
  }
  function resetAllData(){
    if(!confirm('Wirklich alle App-Daten löschen? Erstelle vorher unbedingt ein Backup.')) return;
    if(!confirm('Letzte Sicherheitsfrage: Alle Ausgaben, Belege, Tankstopps, Sichtungen, Reiseetappen und Checklisten löschen?')) return;
    state.expenses=[];
    state.settings.budgets={EUR:0,NAD:0,BWP:0,USD:0};
    state.settings.fuelEntries=[];
    state.settings.wildlifeEntries=[];
    state.settings.itineraryEntries=[];
    state.settings.checklistEntries=[];
    persist();persistSettings();render();showToast('Alle Daten wurden gelöscht');
  }

  function exportBackup(){
    var data={app:'Safari Companion · Namibia & Botswana',version:'1.1',created:new Date().toISOString(),expenses:state.expenses,settings:state.settings};
    var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    var a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='safari-companion-backup-'+todayISO()+'.json'; a.click();
    setTimeout(function(){URL.revokeObjectURL(a.href);},1000);
    showToast('Backup wurde erstellt');
  }
  function importBackup(file){
    var r=new FileReader();
    r.onload=function(){
      try{
        var data=JSON.parse(r.result);
        if(!Array.isArray(data.expenses)) throw new Error();
        state.expenses=data.expenses;
        if(data.settings) state.settings=Object.assign(state.settings,data.settings);
        persist(); persistSettings(); render(); showToast('Backup wiederhergestellt');
      }catch(e){ alert('Diese Datei ist kein gültiges Reisekassen-Backup.'); }
    };
    r.readAsText(file);
  }

  // ---------- Helpers ----------
  function fmt(amount, currency){
    var n = Number(amount)||0;
    var s = n.toLocaleString('de-DE', {minimumFractionDigits:2, maximumFractionDigits:2});
    var sym = CUR_SYMBOL[currency] || currency;
    return sym === '€' ? (s + ' €') : (sym + ' ' + s);
  }
  function totalsByCurrency(list){
    var t = {};
    list.forEach(function(e){
      t[e.currency] = (t[e.currency]||0) + Number(e.amount||0);
    });
    return t;
  }
  function totalsPill(list){
    var t = totalsByCurrency(list);
    var keys = Object.keys(t);
    if(!keys.length) return '<span class="pill">Noch keine Ausgaben</span>';
    return keys.sort().map(function(cur){
      return '<span class="pill"><b>'+fmt(t[cur], cur)+'</b></span>';
    }).join('');
  }
  function dayLabel(dateStr){
    var d = new Date(dateStr+'T00:00:00');
    return d.toLocaleDateString('de-DE', {weekday:'short', day:'2-digit', month:'2-digit', year:'numeric'});
  }
  function svg(paths, extraClass){
    return '<svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">'+paths+'</svg>';
  }

    html += '<input id="backup-file" type="file" accept=".json,application/json" style="display:none"><div class="sub" style="margin-top:10px;line-height:1.45">Sichert Ausgaben und Budgets als JSON-Datei. Bewahre sie z. B. in iCloud Drive auf.</div></div>';

  function renderHistory(){

    }).slice().sort(function(a,b){ return b.date.localeCompare(a.date) || b.id - a.id; });

      html += '<div class="empty">Keine Einträge gefunden.<br>Füge über „Neu" deine erste Ausgabe hinzu.</div>';

  // ---------- Render: Settlement ----------
  function renderSettlement(){
    var html='<div class="section-title">Ausgleich</div>';
    var shared=state.expenses.filter(function(e){return e.type!=='persoenlich';});
    var personalCount=state.expenses.length-shared.length, byCur={};
    shared.forEach(function(e){byCur[e.currency]=byCur[e.currency]||{};byCur[e.currency][e.payer]=(byCur[e.currency][e.payer]||0)+Number(e.amount||0);});
    var curKeys=Object.keys(byCur).sort();
    if(!curKeys.length) return html+'<div class="empty">Noch keine gemeinsamen Ausgaben erfasst.</div>';
    html+='<div class="card">';
    curKeys.forEach(function(cur,idx){
      var total=0; PAYERS.forEach(function(p){total+=byCur[cur][p]||0;});
      var share=total/PAYERS.length, debtors=[], creditors=[];
      PAYERS.forEach(function(p){var bal=(byCur[cur][p]||0)-share;if(bal>0.005)creditors.push({p:p,v:bal});else if(bal<-0.005)debtors.push({p:p,v:-bal});});
      html+='<div class="settle-currency-block" style="'+(idx?'margin-top:18px;padding-top:18px;border-top:1px solid var(--border);':'')+'"><div class="cur-label">'+cur+' · Gesamt '+fmt(total,cur)+' · Anteil je '+fmt(share,cur)+'</div>';
      if(!debtors.length) html+='<div class="settle-hero" style="padding:14px 4px"><div class="verdict">In <b>'+cur+'</b> ist alles ausgeglichen.</div></div>';
      else{
        var transfers=[];
        debtors.forEach(function(d){creditors.forEach(function(c){if(d.v>.005&&c.v>.005){var x=Math.min(d.v,c.v);transfers.push({from:d.p,to:c.p,v:x});d.v-=x;c.v-=x;}});});
        transfers.forEach(function(t){html+='<div class="settle-hero" style="padding:12px 4px"><div class="verdict"><b>'+t.from+'</b> zahlt<br><b>'+fmt(t.v,cur)+'</b><br>an '+t.to+'</div></div>';});
      }
      html+='</div>';
    });
    html+='</div>';
    if(personalCount) html+='<div class="sub" style="margin:12px 4px">🔒 '+personalCount+' persönliche Ausgabe'+(personalCount===1?'':'n')+' nicht berücksichtigt.</div>';
    return html;
  }

  function renderChecklist(){

    var html='<div class="section-title">Reise-Checkliste</div><div class="trip-hero"><h2>✅ Vorbereitung</h2><div class="route">'+done+' von '+items.length+' erledigt</div><div class="progress"><i style="width:'+(items.length?Math.round(done/items.length*100):0)+'%"></i></div></div>';

  function loadReceipt(file){
    if(!file) return;
    if(file.size > 12*1024*1024){ alert('Das Bild ist zu groß. Bitte wähle ein kleineres Foto.'); return; }
    var reader=new FileReader();
    reader.onload=function(ev){
      var img=new Image();
      img.onload=function(){
        var max=1400, scale=Math.min(1,max/Math.max(img.width,img.height));
        var canvas=document.createElement('canvas');
        canvas.width=Math.round(img.width*scale); canvas.height=Math.round(img.height*scale);
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        state.form.receipt=canvas.toDataURL('image/jpeg',0.78);
        render();
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  }

      document.querySelectorAll('[data-check-del]').forEach(function(b){b.addEventListener('click',function(){var id=Number(b.getAttribute('data-check-del'));state.settings.checklistEntries=state.settings.checklistEntries.filter(function(i){return i.id!==id;});persistSettings();render();});});

        state.settings.tripStart = startVal;
        state.settings.tripEnd = endVal;
        persistSettings();render();showToast('Reisezeitraum gespeichert');
      });
      var ts=document.getElementById('trip-save');
      if(ts)ts.addEventListener('click',function(){
        var title=document.getElementById('trip-title').value.trim();

        if(dEnd < dStart){ showToast('Enddatum liegt vor dem Startdatum'); dEndEl.style.borderColor='var(--red)'; return; }
        state.settings.itineraryEntries.push({id:Date.now(),date:dStart,dateEnd:dEnd,type:document.getElementById('trip-type').value,title:title,place:document.getElementById('trip-place').value.trim(),note:document.getElementById('trip-note').value.trim()});
        persistSettings();render();showToast('Etappe gespeichert');
      });
      document.querySelectorAll('[data-trip-del]').forEach(function(b){b.addEventListener('click',function(){
        if(confirm('Diese Reiseetappe löschen?')){var id=Number(b.getAttribute('data-trip-del'));state.settings.itineraryEntries=state.settings.itineraryEntries.filter(function(e){return e.id!==id;});persistSettings();render();}
      });});
    }
    if(state.tab==='wildlife'){
      var selectedPhoto=null, photoInput=document.getElementById('wild-photo-input'), photoBtn=document.getElementById('wild-photo-btn');
      document.querySelectorAll('[data-animal]').forEach(function(b){b.addEventListener('click',function(){document.getElementById('wild-animal').value=b.getAttribute('data-animal');document.getElementById('wild-place').scrollIntoView({behavior:'smooth'});});});
      if(photoBtn&&photoInput) photoBtn.addEventListener('click',function(){photoInput.click();});
      if(photoInput) photoInput.addEventListener('change',function(){
        var file=photoInput.files[0];if(!file)return;var r=new FileReader();r.onload=function(ev){var im=new Image();im.onload=function(){var max=1200,sc=Math.min(1,max/Math.max(im.width,im.height)),c=document.createElement('canvas');c.width=im.width*sc;c.height=im.height*sc;c.getContext('2d').drawImage(im,0,0,c.width,c.height);selectedPhoto=c.toDataURL('image/jpeg',.75);document.getElementById('wild-photo-preview').innerHTML='<div style="position:relative;margin-top:10px;"><img src="'+selectedPhoto+'" style="width:100%;max-height:220px;object-fit:contain;border-radius:9px;display:block"><button type="button" id="wild-photo-clear" style="position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:50%;background:var(--red);color:#fff;border:none;font-size:14px;">✕</button></div>';var clr=document.getElementById('wild-photo-clear');if(clr)clr.addEventListener('click',function(){selectedPhoto=null;photoInput.value='';document.getElementById('wild-photo-preview').innerHTML='';});};im.src=ev.target.result;};r.readAsDataURL(file);
      });
      var ws=document.getElementById('wild-save');if(ws)ws.addEventListener('click',function(){
        state.settings.wildlifeEntries.push({id:Date.now(),animal:document.getElementById('wild-animal').value,date:document.getElementById('wild-date').value,time:document.getElementById('wild-time').value,place:document.getElementById('wild-place').value.trim(),count:Math.max(1,Number(document.getElementById('wild-count').value)||1),note:document.getElementById('wild-note').value.trim(),photo:selectedPhoto});
        persistSettings();render();showToast('Sichtung gespeichert');
      });
      document.querySelectorAll('[data-wild-photo-del]').forEach(function(b){b.addEventListener('click',function(ev){
        ev.stopPropagation();
        if(confirm('Foto aus dieser Sichtung entfernen?')){
          var id=Number(b.getAttribute('data-wild-photo-del'));
          var x=state.settings.wildlifeEntries.find(function(e){return e.id===id;});
          if(x){x.photo=null;persistSettings();render();showToast('Foto entfernt');}
        }
      });});
      document.querySelectorAll('[data-wild-del]').forEach(function(b){b.addEventListener('click',function(){if(confirm('Diese Sichtung löschen?')){var id=Number(b.getAttribute('data-wild-del'));state.settings.wildlifeEntries=state.settings.wildlifeEntries.filter(function(e){return e.id!==id;});persistSettings();render();}});});
    }
    if(state.tab==='fuel'){
      var fuelSave=document.getElementById('fuel-save');
      if(fuelSave) fuelSave.addEventListener('click',function(){
        var km=Number(document.getElementById('fuel-km').value), liters=Number(document.getElementById('fuel-liters').value), cost=Number(document.getElementById('fuel-cost').value);
        if(km<=0||liters<=0||cost<0){alert('Bitte Kilometerstand und Liter korrekt eintragen.');return;}
        state.settings.fuelEntries.push({id:Date.now(),date:document.getElementById('fuel-date').value,odometer:km,liters:liters,cost:cost,currency:document.getElementById('fuel-cur').value,place:document.getElementById('fuel-place').value.trim()});
        persistSettings();render();showToast('Tankvorgang gespeichert');
      });
      document.querySelectorAll('[data-fuel-del]').forEach(function(btn){btn.addEventListener('click',function(){
        var id=Number(btn.getAttribute('data-fuel-del'));
        if(confirm('Diesen Tankvorgang löschen?')){state.settings.fuelEntries=state.settings.fuelEntries.filter(function(e){return e.id!==id;});persistSettings();render();}
      });});
    }
    if(state.tab==='settings'){
      var reset=document.getElementById('reset-all');if(reset)reset.addEventListener('click',resetAllData);
      var add=document.getElementById('add-participant');
      if(add) add.addEventListener('click',function(){PAYERS.push('Neue Person');state.settings.payers=PAYERS.slice();render();});
      document.querySelectorAll('[data-remove-participant]').forEach(function(btn){
        btn.addEventListener('click',function(){if(PAYERS.length<=2)return;PAYERS.splice(Number(btn.getAttribute('data-remove-participant')),1);state.settings.payers=PAYERS.slice();render();});
      });
      var saveP=document.getElementById('save-participants');
      if(saveP) saveP.addEventListener('click',function(){
        var old=PAYERS.slice(), names=[];
        document.querySelectorAll('[data-participant]').forEach(function(el){var n=el.value.trim();if(n)names.push(n);});
        if(names.length<2){alert('Bitte mindestens zwei Teilnehmer eintragen.');return;}
        if(new Set(names).size!==names.length){alert('Jeder Teilnehmer braucht einen eindeutigen Namen.');return;}
        old.forEach(function(o,i){if(names[i]&&o!==names[i])state.expenses.forEach(function(e){if(e.payer===o)e.payer=names[i];});});
        PAYERS=names;state.settings.payers=names.slice();persist();persistSettings();render();showToast('Teilnehmer gespeichert');
      });
    }
    if(state.tab==='dashboard'){
      var saveBudgets=document.getElementById('save-budgets');
      if(saveBudgets) saveBudgets.addEventListener('click',function(){
        document.querySelectorAll('[data-budget]').forEach(function(el){
          state.settings.budgets[el.getAttribute('data-budget')]=Math.max(0,Number(el.value)||0);
        });
        persistSettings(); render(); showToast('Budgets gespeichert');
      });
      var ex=document.getElementById('backup-export');
      if(ex) ex.addEventListener('click',exportBackup);
      var im=document.getElementById('backup-import'), fi=document.getElementById('backup-file');
      if(im&&fi) im.addEventListener('click',function(){fi.click();});
      if(fi) fi.addEventListener('change',function(){if(fi.files&&fi.files[0]) importBackup(fi.files[0]);});
    }
    document.querySelectorAll('#nav button').forEach(function(btn){
      btn.addEventListener('click', function(){
        state.tab = btn.getAttribute('data-tab');
        if(state.tab==='form' && state.editingId===null){
          state.form = blankForm();
        }
        state.pendingDelete = null;
        render();
        scheduleNavHide();
      });
    });

    if(state.tab==='form'){
      document.querySelectorAll('[data-cat]').forEach(function(btn){
        btn.addEventListener('click', function(){
          state.form.category = btn.getAttribute('data-cat');
          render();
        });
      });
      document.querySelectorAll('[data-cur]').forEach(function(btn){
        btn.addEventListener('click', function(){
          state.form.currency = btn.getAttribute('data-cur');
          render();
        });
      });
      document.querySelectorAll('[data-payer]').forEach(function(btn){
        btn.addEventListener('click', function(){
          state.form.payer = btn.getAttribute('data-payer');
          render();
        });
      });
      document.querySelectorAll('[data-type]').forEach(function(btn){
        btn.addEventListener('click', function(){
          state.form.type = btn.getAttribute('data-type');
          render();
        });
      });
      var descEl = document.getElementById('f-desc');
      var amtEl = document.getElementById('f-amount');
      var dateEl = document.getElementById('f-date');
      if(descEl) descEl.addEventListener('input', function(){ state.form.description = descEl.value; });
      if(amtEl) amtEl.addEventListener('input', function(){ state.form.amount = amtEl.value; });
      if(dateEl) dateEl.addEventListener('input', function(){ state.form.date = dateEl.value; });
      var receiptInput=document.getElementById('receipt-input');
      var receiptCameraInput=document.getElementById('receipt-camera-input');
      var receiptLibrary=document.getElementById('receipt-library');
      var receiptCamera=document.getElementById('receipt-camera');
      var receiptRemove=document.getElementById('receipt-remove');
      if(receiptLibrary&&receiptInput) receiptLibrary.addEventListener('click',function(){receiptInput.click();});
      if(receiptCamera&&receiptCameraInput) receiptCamera.addEventListener('click',function(){receiptCameraInput.click();});
      if(receiptInput) receiptInput.addEventListener('change',function(){loadReceipt(receiptInput.files[0]);});
      if(receiptCameraInput) receiptCameraInput.addEventListener('change',function(){loadReceipt(receiptCameraInput.files[0]);});
      if(receiptRemove) receiptRemove.addEventListener('click',function(){state.form.receipt=null;render();});

      var saveBtn = document.getElementById('f-save');
      if(saveBtn) saveBtn.addEventListener('click', function(){ saveForm(); });
      var cancelBtn = document.getElementById('f-cancel');
      if(cancelBtn) cancelBtn.addEventListener('click', function(){
        state.editingId = null;
        state.form = blankForm();
        state.tab = 'history';
        render();
      });
    }

    if(state.tab==='history'){
      document.querySelectorAll('[data-fcat]').forEach(function(el){
        el.addEventListener('click', function(){
          state.histFilterCat = el.getAttribute('data-fcat');
          render();
        });
      });
      document.querySelectorAll('[data-fpayer]').forEach(function(el){
        el.addEventListener('click', function(){
          state.histFilterPayer = el.getAttribute('data-fpayer');
          render();
        });
      });
      document.querySelectorAll('[data-ftype]').forEach(function(el){
        el.addEventListener('click', function(){
          state.histFilterType = el.getAttribute('data-ftype');
          render();
        });
      });
      document.querySelectorAll('[data-edit]').forEach(function(el){
        el.addEventListener('click', function(){
          var id = Number(el.getAttribute('data-edit'));
          var exp = state.expenses.find(function(e){return e.id===id;});
          if(!exp) return;
          state.editingId = id;
          state.form = {
            category: exp.category, description: exp.description, amount: exp.amount,
            currency: exp.currency, payer: exp.payer, date: exp.date, type: exp.type || 'gemeinsam',
            receipt: exp.receipt || null
          };
          state.tab = 'form';
          render();
        });
      });
      document.querySelectorAll('[data-del]').forEach(function(el){
        el.addEventListener('click', function(e){
          e.stopPropagation();
          state.pendingDelete = Number(el.getAttribute('data-del'));
          render();
        });
      });
      document.querySelectorAll('[data-del-yes]').forEach(function(el){
        el.addEventListener('click', function(e){
          e.stopPropagation();
          var id = Number(el.getAttribute('data-del-yes'));
          state.expenses = state.expenses.filter(function(x){return x.id!==id;});
          state.pendingDelete = null;
          persist();
          render();
        });
      });
      document.querySelectorAll('[data-del-no]').forEach(function(el){
        el.addEventListener('click', function(e){
          e.stopPropagation();
          state.pendingDelete = null;
          render();
        });
      });
    }
  }

  function saveForm(){
    var f = state.form;
    if(!f.amount || Number(f.amount) <= 0){
      var amtEl = document.getElementById('f-amount');
      if(amtEl){ amtEl.style.borderColor = 'var(--red)'; amtEl.focus(); }
      return;
    }
    if(state.editingId !== null){
      var exp = state.expenses.find(function(e){return e.id===state.editingId;});
      if(exp){
        exp.category = f.category; exp.description = f.description; exp.amount = Number(f.amount);
        exp.currency = f.currency; exp.payer = f.payer; exp.date = f.date; exp.type = f.type; exp.receipt = f.receipt || null;
      }
      state.editingId = null;
    } else {
      state.expenses.push({
        id: Date.now(),
        category: f.category, description: f.description, amount: Number(f.amount),
        currency: f.currency, payer: f.payer, date: f.date, type: f.type, receipt: f.receipt || null
      });
    }
    persist();
    state.form = blankForm();
    state.tab = 'history';
    render();
  }

  // ---------- Dock-Verhalten der Navigationsleiste (blendet bei Inaktivität aus) ----------
  var navHideTimer = null;
  function showNav(){
    var n = document.getElementById('nav');
    if(n) n.classList.remove('nav-hidden');
    scheduleNavHide();
  }
  function scheduleNavHide(){
    clearTimeout(navHideTimer);
    navHideTimer = setTimeout(function(){
      var n = document.getElementById('nav');
      if(n) n.classList.add('nav-hidden');
    }, 3200);
  }
  (function initDock(){
    var mainEl = document.getElementById('main');
    var handle = document.getElementById('nav-handle');
    var fab = document.getElementById('fab-add');
    if(mainEl){
      mainEl.addEventListener('touchstart', showNav, {passive:true});
      mainEl.addEventListener('scroll', showNav, {passive:true});
      mainEl.addEventListener('click', showNav);
    }
    if(handle){
      handle.addEventListener('click', showNav);
    }
    // Wisch-nach-oben vom unteren Bildschirmrand blendet die Leiste ein
    var touchStartY = null, touchStartX = null;
    document.addEventListener('touchstart', function(ev){
      var t = ev.touches[0];
      if(t.clientY > window.innerHeight - 40){
        touchStartY = t.clientY; touchStartX = t.clientX;
      } else {
        touchStartY = null;
      }
    }, {passive:true});
    document.addEventListener('touchmove', function(ev){
      if(touchStartY===null) return;
      var t = ev.touches[0];
      if(touchStartY - t.clientY > 18){
        showNav();
        touchStartY = null;
      }
    }, {passive:true});
    if(fab){
      fab.addEventListener('click', function(){
        state.tab = 'form';
        if(state.editingId===null) state.form = blankForm();
        state.pendingDelete = null;
        render();
        showNav();
      });
    }
    scheduleNavHide();
  })();

  render();
  loadExpenses();
})();
</script>
