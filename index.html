  header, main, nav{ position:relative; z-index:1; }
  header{
    padding:calc(env(safe-area-inset-top) + 18px) 20px 14px;
    border-bottom:1px solid var(--border);
    flex-shrink:0;
    position:relative;
  }
  header .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--gold);
    text-shadow:0 1px 4px rgba(0,0,0,.5);
  }
  header h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:26px;
    margin:2px 0 0;
    letter-spacing:0.01em;
    text-shadow:0 1px 6px rgba(0,0,0,.55);
  }
  header h1 em{
    font-style:italic;
    font-weight:500;
    color:var(--sand-dim);
  }
  main{
    flex:1;
    overflow-y:auto;
    padding:16px 16px calc(90px + env(safe-area-inset-bottom));
  }
  .section-title{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--sand-dim);
    margin:22px 4px 10px;
    text-shadow:0 1px 4px rgba(0,0,0,.5);
  }
  .section-title:first-child{margin-top:4px;}

  /* Stamp badge — signature element */
  .stamp{
    width:46px;height:46px;
    border-radius:50%;
    border:1.5px dashed var(--border-strong);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    background:var(--bg-elev2);
    color:var(--gold);
    transform:rotate(-4deg);
    font-size:20px;
    line-height:1;
  }
  .stamp svg{width:22px;height:22px;stroke:currentColor;}
  .stamp.sm{width:34px;height:34px;font-size:15px;}
  .stamp.sm svg{width:16px;height:16px;}

  .totals-strip{
    display:flex;gap:8px;flex-wrap:wrap;
  }
  .pill{
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    padding:8px 12px;
    border-radius:100px;
    background:var(--bg-elev);
    border:1px solid var(--border);
    color:var(--sand);
  }
  .pill b{color:var(--gold);font-weight:600;}

  .card{
    background:var(--bg-elev);
    border:1px solid var(--border);
    border-radius:16px;
    padding:14px;
    margin-bottom:10px;
  }
  .cat-row{
    display:flex;align-items:center;gap:12px;
    padding:6px 2px;
  }
  .cat-row .meta{flex:1;min-width:0;}
  .cat-row .label{font-size:14.5px;font-weight:500;}
  .cat-row .sub{font-size:11.5px;color:var(--sand-dim);margin-top:1px;}
  .cat-row .amounts{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    text-align:right;
    color:var(--gold);
    line-height:1.5;
  }

  .payer-bar-wrap{margin-top:6px;}
  .payer-bar{
    height:8px;border-radius:100px;overflow:hidden;
    display:flex;background:var(--bg-elev2);border:1px solid var(--border);
  }
  .payer-bar .a{background:var(--gold);}
  .payer-bar .b{background:var(--rust);}
  .legend{display:flex;justify-content:space-between;font-size:11.5px;color:var(--sand-dim);margin-top:6px;font-family:'IBM Plex Mono',monospace;}
  .legend .a-dot{color:var(--gold);}
  .legend .b-dot{color:var(--rust);}

  /* history */
  .filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:6px;}
  .chip{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;white-space:nowrap;
    padding:6px 11px;border-radius:100px;
    border:1px solid var(--border);
    background:var(--bg-elev);color:var(--sand-dim);
    flex-shrink:0;
  }
  .chip.active{border-color:var(--gold);color:var(--gold);background:rgba(201,154,70,0.10);}
  .confirm-chip.active{border-color:#4f9c5c!important;color:#3d7a48!important;background:rgba(95,174,107,.22)!important;font-weight:600}

  .exp-item{
    display:flex;align-items:center;gap:12px;
    padding:11px 4px;
    border-bottom:1px solid var(--border);
  }
  .exp-item:last-child{border-bottom:none;}

  .empty{

  /* Form */
  .field{margin-bottom:16px;}
  .field label{
    display:block;font-family:'IBM Plex Mono',monospace;
    font-size:11px;letter-spacing:0.08em;text-transform:uppercase;
    color:var(--sand-dim);margin-bottom:8px;
  }
  .field input, .field select{
    width:100%;background:var(--bg-elev2);border:1px solid var(--border-strong);
    color:var(--sand);border-radius:10px;padding:12px 12px;
    font-size:15px;font-family:'Inter',sans-serif;
    -webkit-appearance:none;appearance:none;
    box-sizing:border-box;
  }
  input[type="date"], input[type="time"]{
    -webkit-appearance:none;appearance:none;
    min-height:44px;
  }
  input[type="date"]::-webkit-date-and-time-value,
  input[type="time"]::-webkit-date-and-time-value{
    text-align:left;
  }
  .field input:focus, .field select:focus{outline:2px solid var(--gold);outline-offset:1px;}
  .field input::placeholder{color:var(--sand-dim);}
  .grid-cats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .cat-btn{
    display:flex;flex-direction:column;align-items:center;gap:6px;
    background:none;border:none;padding:6px 2px;color:var(--sand-dim);
  }
  .cat-btn .stamp{transition:transform .15s ease, color .15s ease, border-color .15s ease;}
  .cat-btn.active{color:var(--gold);}
  .cat-btn.active .stamp{color:var(--gold);border-color:var(--gold);border-style:solid;transform:rotate(0deg) scale(1.05);}
  .cat-btn span{font-size:10px;text-align:center;line-height:1.25;}

  .seg{display:flex;border:1px solid var(--border-strong);border-radius:10px;overflow:hidden;}
  .seg button{
    flex:1;background:var(--bg-elev2);border:none;color:var(--sand-dim);
    padding:12px 6px;font-size:13.5px;font-family:'Inter',sans-serif;font-weight:500;
    border-left:1px solid var(--border-strong);
  }
  .seg button:first-child{border-left:none;}
  .seg button.active{background:var(--gold);color:#1a1408;}

  .currency-row{display:flex;gap:8px;}
  .currency-row button{
    font-family:'IBM Plex Mono',monospace;font-size:12.5px;
    padding:9px 0;flex:1;border-radius:9px;border:1px solid var(--border-strong);
    background:var(--bg-elev2);color:var(--sand-dim);
  }
  .currency-row button.active{color:var(--gold);border-color:var(--gold);background:rgba(201,154,70,0.10);}

  .save-btn{
    width:100%;padding:15px;border-radius:12px;border:none;
    background:var(--gold);color:#1a1408;font-weight:600;font-size:15px;
    font-family:'Inter',sans-serif;margin-top:6px;
  }
  .save-btn:active{background:var(--gold-dim);}
  .cancel-edit{
    width:100%;padding:12px;border-radius:12px;border:1px solid var(--border-strong);
    background:none;color:var(--sand-dim);font-size:13.5px;margin-top:8px;font-family:'Inter',sans-serif;
  }

  /* Settlement */
  .settle-hero{
    text-align:center;padding:28px 16px;
  }
  .settle-hero .stamp{margin:0 auto 14px;width:64px;height:64px;}
  .settle-hero .stamp svg{width:30px;height:30px;}
  .settle-hero .verdict{
    font-family:'Fraunces',serif;font-style:italic;font-weight:500;
    font-size:19px;color:var(--sand);line-height:1.4;
  }
  .settle-hero .verdict b{font-style:normal;font-weight:600;color:var(--gold);}
  .settle-currency-block{margin-bottom:14px;}
  .settle-currency-block .cur-label{
    font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--sand-dim);
    letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;
  }

  nav{
    position:absolute;bottom:0;left:0;right:0;
    display:flex;
    background:rgba(23,19,16,0.92);
    backdrop-filter:blur(14px);
    border-top:1px solid var(--border);
    padding:8px 6px calc(10px + env(safe-area-inset-bottom));
    transition:transform .32s cubic-bezier(.4,0,.2,1), opacity .32s ease;
    z-index:20;
  }
  nav.nav-hidden{
    transform:translateY(100%);
  }
  nav button{
    flex:1;background:none;border:2px solid transparent;color:var(--sand-dim);
    display:flex;flex-direction:column;align-items:center;gap:4px;
    padding:6px 2px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.03em;
    border-radius:12px;
    transition:border-color .15s ease, background .15s ease;
  }
  nav button svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.6;}
  nav button.active{
    color:var(--gold);
    border-color:var(--gold);
    background:rgba(201,154,70,.14);
  }

  #nav-handle{
    position:absolute;left:0;right:0;bottom:0;
    height:26px;
    display:flex;align-items:flex-end;justify-content:center;
    padding-bottom:6px;
    z-index:19;
    -webkit-tap-highlight-color:transparent;
  }
  #nav-handle i{
    display:block;width:40px;height:5px;border-radius:3px;
    background:var(--gold-dim);opacity:.55;
    transition:opacity .25s ease;
  }
  nav:not(.nav-hidden) ~ #nav-handle{opacity:0;pointer-events:none;}

  #fab-add{
    position:absolute;right:16px;bottom:calc(78px + env(safe-area-inset-bottom));
    width:52px;height:52px;border-radius:50%;
    background:var(--gold);color:var(--bg);border:none;
    font-family:'Fraunces',serif;font-size:28px;line-height:1;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 18px rgba(0,0,0,.4);
    z-index:21;
    transition:transform .2s ease, bottom .32s cubic-bezier(.4,0,.2,1);
  }
  #fab-add:active{transform:scale(.92);}
  nav.nav-hidden ~ #fab-add{bottom:calc(24px + env(safe-area-inset-bottom));}

  /* Reise-Cockpit, Budget & Datensicherung */
  .trip-hero{background:linear-gradient(135deg,rgba(201,154,70,.18),rgba(168,84,46,.12));border:1px solid var(--border-strong);border-radius:18px;padding:18px;margin-bottom:12px}
  .trip-hero h2{font-family:'Fraunces',serif;font-size:22px;margin:0 0 4px}
  .trip-hero .route{color:var(--sand-dim);font-size:12px}
  .count-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px}
  .count-box{background:rgba(23,19,16,.55);border:1px solid var(--border);border-radius:12px;padding:12px 6px;text-align:center}
  .count-box b{display:block;color:var(--gold);font-family:'IBM Plex Mono',monospace;font-size:20px}
  .count-box span{font-size:10px;color:var(--sand-dim);text-transform:uppercase;letter-spacing:.06em}
  .budget-row{padding:10px 2px;border-top:1px solid var(--border)}
  .budget-row:first-child{border-top:none}
  .budget-head{display:flex;justify-content:space-between;gap:10px;font-size:13px}
  .budget-head b{color:var(--gold);font-family:'IBM Plex Mono',monospace}
  .progress{height:8px;background:var(--bg-elev2);border:1px solid var(--border);border-radius:99px;overflow:hidden;margin:8px 0 5px}
  .progress i{display:block;height:100%;background:var(--gold);border-radius:99px}
  .budget-meta{display:flex;justify-content:space-between;color:var(--sand-dim);font-size:10.5px;font-family:'IBM Plex Mono',monospace}
  .tool-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .tool-btn{border:1px solid var(--border-strong);background:var(--bg-elev2);color:var(--sand);border-radius:11px;padding:12px 8px;font-family:'Inter',sans-serif;font-weight:600}
  .tool-btn.danger{color:#e49b91}
  .budget-inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .budget-inputs label{font-size:10px;color:var(--sand-dim);font-family:'IBM Plex Mono',monospace}
  .budget-inputs input{margin-top:5px;width:100%;background:var(--bg-elev2);border:1px solid var(--border-strong);color:var(--sand);border-radius:9px;padding:10px}








  .final-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(201,154,70,.14);border:1px solid var(--border-strong);color:var(--gold);border-radius:99px;padding:6px 10px;font-size:10px;font-family:'IBM Plex Mono',monospace;margin-bottom:10px}
  .check-row{display:flex;align-items:center;gap:10px;padding:14px 12px;margin-bottom:10px;border-radius:12px;background:rgba(255,252,245,.9)!important;border:1px solid rgba(201,154,70,.2)}
  .card.list-transparent, div.list-transparent{background:transparent!important;box-shadow:none!important;border:none!important;padding-left:0!important;padding-right:0!important}
  .check-row:last-child{margin-bottom:0}
  .check-row.done .check-text{text-decoration:line-through;opacity:.55}
  .check-toggle{width:25px;height:25px;border-radius:8px;border:1px solid var(--border-strong);background:var(--bg-elev2);color:var(--gold);font-weight:700}
  .check-text{flex:1;font-size:13px}.check-cat{font-size:9px;color:var(--sand-dim);text-transform:uppercase;letter-spacing:.06em}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
  .stat-card{background:var(--bg-elev2);border:1px solid var(--border);border-radius:12px;padding:13px}
  .stat-card b{display:block;color:var(--gold);font-family:'IBM Plex Mono',monospace;font-size:17px}
  .stat-card span{font-size:10px;color:var(--sand-dim)}
  .rank-row{margin:12px 0}.rank-head{display:flex;justify-content:space-between;font-size:12px;gap:8px}.rank-head b{color:var(--gold);font-family:'IBM Plex Mono',monospace}
  .trip-entry{display:flex;gap:11px;align-items:flex-start;padding:12px 2px;border-bottom:1px solid var(--border)}
  .trip-entry:last-child{border-bottom:none}
  .trip-date{min-width:48px;text-align:center;background:var(--bg-elev2);border:1px solid var(--border);border-radius:10px;padding:7px 4px}
  .trip-date b{display:block;color:var(--gold);font-size:18px;font-family:'IBM Plex Mono',monospace}
  .trip-date span{font-size:9px;color:var(--sand-dim);text-transform:uppercase}
  .trip-entry .meta{flex:1;min-width:0}.trip-entry .desc{font-weight:600}.trip-entry .sub{font-size:11px;color:var(--sand-dim);margin-top:3px;line-height:1.4}
  .wild-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
  .wild-btn{background:var(--bg-elev2);border:1px solid var(--border);border-radius:12px;padding:12px 5px;color:var(--sand);text-align:center}
  .wild-btn b{display:block;font-size:24px;margin-bottom:4px}.wild-btn span{font-size:10px}
  .wild-photo{width:52px;height:52px;border-radius:9px;object-fit:cover;border:1px solid var(--border-strong)}
  .wild-photo-wrap{position:relative;width:52px;height:52px;flex-shrink:0}
  .wild-photo-del{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--red);color:#fff;border:2px solid var(--bg);font-size:11px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0;cursor:pointer}
  .fuel-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .fuel-grid .field{margin-bottom:8px}
  .fuel-stat{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
  .fuel-stat div{background:var(--bg-elev2);border:1px solid var(--border);border-radius:11px;padding:11px;text-align:center}
  .fuel-stat b{display:block;color:var(--gold);font-family:'IBM Plex Mono',monospace;font-size:16px}
  .fuel-stat span{font-size:10px;color:var(--sand-dim)}
  .participant-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
  .participant-row input{flex:1;background:var(--bg-elev2);border:1px solid var(--border-strong);color:var(--sand);border-radius:9px;padding:11px}
  .participant-row button{background:none;border:1px solid var(--border-strong);color:var(--red);border-radius:9px;padding:10px 12px}
  .hint-box{font-size:11.5px;color:var(--sand-dim);line-height:1.45;margin-top:9px}
  .receipt-box{border:1px dashed var(--border-strong);border-radius:12px;padding:12px;text-align:center;background:var(--bg-elev2)}
  .receipt-box input{display:none}
  .receipt-actions{display:flex;gap:8px;justify-content:center}
  .receipt-btn{border:1px solid var(--border-strong);background:var(--bg);color:var(--sand);border-radius:9px;padding:10px 12px;font-weight:600}
  .receipt-preview{margin-top:10px;position:relative}
  .receipt-preview img{width:100%;max-height:240px;object-fit:contain;border-radius:10px;background:#0d0b09}
  .receipt-badge{font-size:10px;color:var(--gold);font-family:'IBM Plex Mono',monospace;margin-top:4px}
  .receipt-thumb{width:34px;height:34px;border-radius:7px;object-fit:cover;border:1px solid var(--border-strong);flex-shrink:0}
  .toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%);background:var(--sand);color:var(--bg);padding:10px 14px;border-radius:99px;font-size:12px;font-weight:600;z-index:20;box-shadow:0 8px 30px rgba(0,0,0,.35)}


  button,input,select{font-size:16px}
  button{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  input,select{min-height:44px}
  .save-btn,.tool-btn,.receipt-btn{min-height:46px}
  .app{padding-bottom:calc(92px + env(safe-area-inset-bottom))}
  .bottom-nav{padding-bottom:max(8px,env(safe-area-inset-bottom))}
  @media(max-width:390px){
    .nav-label{font-size:8px}
    .nav-item{min-width:58px}
    .count-box b{font-size:17px}
    .wild-grid{grid-template-columns:repeat(3,1fr)}
  }
  @media print{
    .bottom-nav,.save-btn,.tool-btn,.del-btn,.receipt-actions{display:none!important}
    body{background:#fff;color:#111}
    .card,.trip-hero{break-inside:avoid;border:1px solid #bbb;background:#fff;color:#111}
  }
  ::-webkit-scrollbar{display:none;}

  async function cloudRequest(method, body){
    var url = SUPABASE_URL + '/rest/v1/reisekasse_sync?id=eq.' + encodeURIComponent(CLOUD_ID);
    var headers = {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'resolution=merge-duplicates,return=minimal' : 'return=minimal'
    };
    var opts = {method:method, headers:headers};
    if(body) opts.body = JSON.stringify(body);
    var res = await fetch(url, opts);
    if(!res.ok){
      var bodyText = '';
      try{ bodyText = await res.text(); }catch(e2){}
      throw new Error('HTTP ' + res.status + ' ' + res.statusText + (bodyText ? ' — ' + bodyText : ''));
    }
    if(method === 'GET') return await res.json();
  }

  var lastCloudSnapshot = null; // letzter bekannter Stand aus der Cloud, zum Erkennen von Änderungen
  var lastLocalChangeAt = 0;    // Zeitpunkt der letzten eigenen Änderung, um Wettlaufsituationen zu vermeiden
  var cloudPollTimer = null;
  var cloudStatus = 'unknown';  // 'ok' | 'error' | 'unknown' – für Diagnose-Anzeige

  function isEditingNow(){
    var el = document.activeElement;
    if(!el) return false;
    var tag = el.tagName;
    return tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';
  }

  async function loadCloudData(isPoll){
    try{
      var rows = await cloudRequest('GET');
      cloudStatus = 'ok';
      if(rows && rows[0] && rows[0].data){
        var d = rows[0].data;
        var incomingRaw = JSON.stringify(d);
        // Nichts Neues? Dann gar nichts anfassen (kein Re-Render, kein Flackern).
        if(incomingRaw === lastCloudSnapshot) return;

        // Während der Nutzer gerade tippt/etwas auswählt, nicht drüberbügeln.
        // Beim nächsten Poll (oder beim Fokus-Wechsel) wird nachgezogen.
        if(isPoll && isEditingNow()) return;

        // Eigene Änderung ist frisch (< 2s) unterwegs zur Cloud -> nicht überschreiben,
        // sonst kann ein Poll dazwischenfunken und den eigenen Save "zurückrollen".
        if(Date.now() - lastLocalChangeAt < 2000) return;

        lastCloudSnapshot = incomingRaw;
        if(Array.isArray(d.expenses)) state.expenses = d.expenses;
        if(d.settings) state.settings = Object.assign(state.settings, d.settings);
        PAYERS = (state.settings.payers || ['Dirk & Antje','Sven']).slice();
        localStorage.setItem('reisekasse_expenses', JSON.stringify(state.expenses));
        localStorage.setItem('reisekasse_settings', JSON.stringify(state.settings));
        state.storageMode = 'cloud';
        render();
      } else if(!isPoll){
        await saveCloudData();
      }
    }catch(e){
      cloudStatus = 'error';
      lastCloudError = 'GET fehlgeschlagen: ' + e.message;
      console.warn('Cloud nicht erreichbar, lokale Daten bleiben aktiv.', e);
      render();
    }
  }

  async function saveCloudData(){
    try{
      var payload = {expenses:state.expenses, settings:state.settings};
      await cloudRequest('POST', {id:CLOUD_ID, data:payload, updated_at:new Date().toISOString()});
      lastCloudSnapshot = JSON.stringify(payload);
      state.storageMode = 'cloud';
      cloudStatus = 'ok';
      lastCloudError = null;
      lastCloudSuccessAt = new Date().toLocaleTimeString('de-DE');
      render();
    }catch(e){
      cloudStatus = 'error';
      lastCloudError = 'SAVE fehlgeschlagen: ' + e.message;
      console.warn('Cloud-Speicherung fehlgeschlagen.', e);
      render();
    }
  }

  function queueCloudSave(){
    lastLocalChangeAt = Date.now();
    clearTimeout(cloudSaveTimer);
    cloudSaveTimer = setTimeout(saveCloudData, 350);
  }

  // 1) Regelmäßiges Polling im Hintergrund (alle 6s), solange die App offen/sichtbar ist.
  // 2) Sofortiger Abgleich, sobald die App wieder in den Vordergrund kommt
  //    (z.B. App-Wechsel auf dem Handy, Bildschirm wieder einschalten).
  function startCloudSync(){
    clearInterval(cloudPollTimer);
    cloudPollTimer = setInterval(function(){
      if(document.hidden) return;
      loadCloudData(true);
    }, 6000);

    document.addEventListener('visibilitychange', function(){
      if(!document.hidden) loadCloudData(true);
    });
    window.addEventListener('focus', function(){ loadCloudData(true); });
  }

  // ---------- Storage ----------
  // Nutzt window.storage, wenn die App innerhalb von Claude läuft.
  // Läuft die App als eigenständige Datei (z.B. auf dem iPhone geöffnet
  // oder zum Home-Bildschirm hinzugefügt), wird automatisch auf das
  // browsereigene localStorage umgeschaltet, damit Einträge erhalten bleiben.
  var hasClaudeStorage = (typeof window !== 'undefined' && window.storage && typeof window.storage.get === 'function');

  async function loadExpenses(){
    if(hasClaudeStorage){
      state.storageMode = 'claude';
      try{
        var res = await window.storage.get('expenses', false);
        state.expenses = res && res.value ? JSON.parse(res.value) : [];
      }catch(e){
        state.expenses = []; // noch kein Eintrag vorhanden
      }
    } else {
      state.storageMode = 'local';
      try{
        var raw = localStorage.getItem('reisekasse_expenses');
        state.expenses = raw ? JSON.parse(raw) : [];
      }catch(e){
        state.expenses = [];
      }
    }
    try{
      var savedSettings = localStorage.getItem('reisekasse_settings');
      if(savedSettings) state.settings = Object.assign(state.settings, JSON.parse(savedSettings));
      if(!state.settings.tripName) state.settings.tripName = 'Namibia & Botswana';
      if(!Array.isArray(state.settings.customTabs)) state.settings.customTabs=[];
      if(!Array.isArray(state.settings.hiddenTabs)) state.settings.hiddenTabs=[];
      if(!state.settings.customEntries || typeof state.settings.customEntries!=='object') state.settings.customEntries={};
      state.settings.budgets = Object.assign({EUR:0,NAD:0,BWP:0,USD:0}, state.settings.budgets || {});
      if(!Array.isArray(state.settings.payers) || !state.settings.payers.length) state.settings.payers=['Dirk & Antje','Sven'];
      if(!Array.isArray(state.settings.fuelEntries)) state.settings.fuelEntries=[];
      if(!Array.isArray(state.settings.vehicles) || !state.settings.vehicles.length) state.settings.vehicles=['Fahrzeug 1','Fahrzeug 2'];

      if(!Array.isArray(state.settings.checklistEntries)) state.settings.checklistEntries=[];
      if(!Array.isArray(state.settings.insuranceEntries)) state.settings.insuranceEntries=[];
      PAYERS = state.settings.payers.slice();
      ensureSharedPackingList();
    }catch(e){}
    state.loaded = true;
    render();
    loadCloudData().then(startCloudSync);
  }

  async function persist(){
    if(state.storageMode === 'claude'){
      try{
        await window.storage.set('expenses', JSON.stringify(state.expenses), false);
        return;
      }catch(e){ /* fällt unten auf localStorage zurück */ }
    }
    try{
      localStorage.setItem('reisekasse_expenses', JSON.stringify(state.expenses));
    }catch(e){ /* silent */ }
    queueCloudSave();
  }

  function persistSettings(){
    try{ localStorage.setItem('reisekasse_settings', JSON.stringify(state.settings)); }catch(e){}
    queueCloudSave();
  }

  function daysBetween(a,b){
    var one = 86400000;
    return Math.ceil((new Date(b+'T00:00:00') - new Date(a+'T00:00:00'))/one);
  }
  function todayISO(){ return new Date().toISOString().slice(0,10); }
  function showToast(msg){
    var old=document.querySelector('.toast'); if(old) old.remove();
    var t=document.createElement('div'); t.className='toast'; t.textContent=msg;
    document.body.appendChild(t); setTimeout(function(){t.remove();},2200);
  }

  function exportBackup(){
    var data={app:'Safari Companion · Namibia & Botswana',version:'1.1',created:new Date().toISOString(),expenses:state.expenses,settings:state.settings};
    var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    var a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='safari-companion-backup-'+todayISO()+'.json'; a.click();
    setTimeout(function(){URL.revokeObjectURL(a.href);},1000);
    showToast('Backup wurde erstellt');
  }
  function importBackup(file){
    var r=new FileReader();
    r.onload=function(){
      try{
        var data=JSON.parse(r.result);
        if(!Array.isArray(data.expenses)) throw new Error();
        state.expenses=data.expenses;
        if(data.settings) state.settings=Object.assign(state.settings,data.settings);
        persist(); persistSettings(); render(); showToast('Backup wiederhergestellt');
      }catch(e){ alert('Diese Datei ist kein gültiges Reisekassen-Backup.'); }
    };
    r.readAsText(file);
  }

  // ---------- Helpers ----------
  function fmt(amount, currency){
    var n = Number(amount)||0;
    var s = n.toLocaleString('de-DE', {minimumFractionDigits:2, maximumFractionDigits:2});
    var sym = CUR_SYMBOL[currency] || currency;
    return sym === '€' ? (s + ' €') : (sym + ' ' + s);
  }
  function totalsByCurrency(list){
    var t = {};
    list.forEach(function(e){
      t[e.currency] = (t[e.currency]||0) + Number(e.amount||0);
    });
    return t;
  }
  function totalsPill(list){
    var t = totalsByCurrency(list);
    var keys = Object.keys(t);
    if(!keys.length) return '<span class="pill">Noch keine Ausgaben</span>';
    return keys.sort().map(function(cur){
      return '<span class="pill"><b>'+fmt(t[cur], cur)+'</b></span>';
    }).join('');
  }
  function dayLabel(dateStr){
    var d = new Date(dateStr+'T00:00:00');
    return d.toLocaleDateString('de-DE', {weekday:'short', day:'2-digit', month:'2-digit', year:'numeric'});
  }
  function svg(paths, extraClass){
    return '<svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">'+paths+'</svg>';
  }

  // ---------- Render: Settlement ----------
  function renderSettlement(){
    var html='<div class="section-title">Ausgleich</div>';
    var shared=state.expenses.filter(function(e){return e.type!=='persoenlich';});
    var personalCount=state.expenses.length-shared.length, byCur={};
    shared.forEach(function(e){byCur[e.currency]=byCur[e.currency]||{};byCur[e.currency][e.payer]=(byCur[e.currency][e.payer]||0)+Number(e.amount||0);});
    var curKeys=Object.keys(byCur).sort();
    if(!curKeys.length) return html+'<div class="empty">Noch keine gemeinsamen Ausgaben erfasst.</div>';
    html+='<div class="card">';
    curKeys.forEach(function(cur,idx){
      var total=0; PAYERS.forEach(function(p){total+=byCur[cur][p]||0;});
      var share=total/PAYERS.length, debtors=[], creditors=[];
      PAYERS.forEach(function(p){var bal=(byCur[cur][p]||0)-share;if(bal>0.005)creditors.push({p:p,v:bal});else if(bal<-0.005)debtors.push({p:p,v:-bal});});
      html+='<div class="settle-currency-block" style="'+(idx?'margin-top:18px;padding-top:18px;border-top:1px solid var(--border);':'')+'"><div class="cur-label">'+cur+' · Gesamt '+fmt(total,cur)+' · Anteil je '+fmt(share,cur)+'</div>';
      if(!debtors.length) html+='<div class="settle-hero" style="padding:14px 4px"><div class="verdict">In <b>'+cur+'</b> ist alles ausgeglichen.</div></div>';
      else{
        var transfers=[];
        debtors.forEach(function(d){creditors.forEach(function(c){if(d.v>.005&&c.v>.005){var x=Math.min(d.v,c.v);transfers.push({from:d.p,to:c.p,v:x});d.v-=x;c.v-=x;}});});
        transfers.forEach(function(t){html+='<div class="settle-hero" style="padding:12px 4px"><div class="verdict"><b>'+t.from+'</b> zahlt<br><b>'+fmt(t.v,cur)+'</b><br>an '+t.to+'</div></div>';});
      }
      html+='</div>';
    });
    html+='</div>';
    if(personalCount) html+='<div class="sub" style="margin:12px 4px">🔒 '+personalCount+' persönliche Ausgabe'+(personalCount===1?'':'n')+' nicht berücksichtigt.</div>';
    return html;
  }

  var CHECKLIST_CAT_MAP = {'Dokumente':'Dokumente','Reisemedizin':'Gesundheit','Kleidung':'Gepäck','Auto':'Fahrzeug','Sonstiges':'Sonstiges'};

  function syncPackingItemToChecklist(item){
    if(!Array.isArray(state.settings.checklistEntries)) state.settings.checklistEntries=[];
    var existing = state.settings.checklistEntries.find(function(c){return c.fromPacking===item.id;});
    if(existing){
      existing.soloBy = item.soloBy || null;
      return;
    }
    state.settings.checklistEntries.push({
      id: Date.now()+Math.floor(Math.random()*1000),
      text: item.text,
      category: CHECKLIST_CAT_MAP[item.category] || 'Sonstiges',
      done: false,
      confirmedBy: [],
      soloBy: item.soloBy || null,
      fromPacking: item.id
    });
  }

  function removePackingItemFromChecklist(item){
    if(!Array.isArray(state.settings.checklistEntries)) return;
    state.settings.checklistEntries = state.settings.checklistEntries.filter(function(c){return c.fromPacking!==item.id;});
  }

  function updateChecklistSyncFor(item){
    var allConfirmed = !!item.soloBy || PAYERS.every(function(p){return item.confirmedBy.indexOf(p)!==-1;});
    if(allConfirmed) syncPackingItemToChecklist(item);
    else removePackingItemFromChecklist(item);
    return allConfirmed;
  }

    var done=items.filter(function(x){return x.soloBy ? x.confirmedBy.indexOf(x.soloBy)!==-1 : PAYERS.every(function(p){return x.confirmedBy.indexOf(p)!==-1;});}).length;

  function renderFuel(){

    var asc=entries.slice().sort(function(a,b){return a.odometer-b.odometer;});

    html+='<div><b>'+dist.toLocaleString("de-DE")+' km</b><span>Erfasste Strecke</span></div>';
    html+='<div><b>'+(consumption?consumption.toLocaleString("de-DE",{maximumFractionDigits:1})+' l':'—')+'</b><span>Ø je 100 km*</span></div></div>';
    html+='<div class="card" id="vehicles-toggle" style="cursor:pointer;display:flex;align-items:center;justify-content:space-between">';

    html+='<span style="transition:transform .2s ease;'+(state.vehiclesOpen?'transform:rotate(180deg)':'')+'">▾</span></div>';
    if(state.vehiclesOpen){

        html+='<div class="participant-row"><input type="text" data-vehicle="'+i+'" value="'+escapeAttr(v)+'"><button type="button" data-remove-vehicle="'+i+'" '+(vehicles.length<=1?'disabled style="opacity:.35"':'')+'>✕</button></div>';

  // ---------- Nav ----------
  var BASE_TABS = [
    { key:'dashboard', label:'Übersicht', icon:ICONS.dashboard },
    { key:'form', label:'Neu', icon:ICONS.plus },
    { key:'history', label:'Verlauf', icon:ICONS.list },
    { key:'settlement', label:'Ausgleich', icon:ICONS.scale },
    { key:'packing', label:'Packliste', icon:ICONS.packing },
    { key:'checklist', label:'Checkliste', icon:ICONS.checklist },
    { key:'stats', label:'Statistik', icon:ICONS.stats },
    { key:'trip', label:'Reise', icon:ICONS.trip },
    { key:'wildlife', label:'Safari', icon:ICONS.wildlife },
    { key:'fuel', label:'Tankbuch', icon:ICONS.fuel },
    { key:'insurance', label:'Versicherungen', icon:ICONS.insurance },
    { key:'settings', label:'Personen', icon:ICONS.settings }
  ];

  function getActiveTabs(){
    var hidden = state.settings.hiddenTabs || [];
    var custom = state.settings.customTabs || [];
    var base = BASE_TABS.filter(function(t){ return hidden.indexOf(t.key)===-1; });
    var extra = custom.filter(function(t){ return hidden.indexOf(t.key)===-1; }).map(function(t){ return {key:t.key,label:t.label,emoji:t.emoji}; });
    return base.concat(extra);
  }

  function renderNav(){
    return getActiveTabs().map(function(t){
      var iconHtml = t.icon ? svg(t.icon) : '<span style="font-size:20px;line-height:1">'+(t.emoji||'📌')+'</span>';
      return '<button data-tab="'+t.key+'" class="'+(state.tab===t.key?'active':'')+'">'+
        iconHtml+'<span>'+escapeAttr(t.label)+'</span></button>';
    }).join('');
  }

  function renderCustomTab(key){
    var def = (state.settings.customTabs||[]).find(function(t){return t.key===key;});
    if(!def) return '<div class="empty">Kategorie nicht gefunden.</div>';
    if(!state.settings.customEntries) state.settings.customEntries={};
    if(!Array.isArray(state.settings.customEntries[key])) state.settings.customEntries[key]=[];
    var items = state.settings.customEntries[key];
    var done = items.filter(function(x){return x.done;}).length;
    var html='<div class="section-title">'+escapeAttr(def.label)+'</div><div class="trip-hero"><h2>'+(def.emoji||'📌')+' '+escapeAttr(def.label)+'</h2><div class="route">'+done+' von '+items.length+' erledigt</div><div class="progress"><i style="width:'+(items.length?Math.round(done/items.length*100):0)+'%"></i></div></div>';
    html+='<div class="card"><div class="field"><label>Neuer Eintrag</label><input id="custom-text" placeholder="z. B. Geschenk für Sven"></div><button class="save-btn" id="custom-add">Hinzufügen</button></div>';
    if(!items.length) html+='<div class="empty">Noch keine Einträge.</div>';
    else html+='<div class="card">'+items.map(function(x){return '<div class="check-row '+(x.done?'done':'')+'"><div class="check-text" data-custom-toggle="'+x.id+'">'+escapeAttr(x.text)+'</div><button class="del-btn" data-custom-del="'+x.id+'">✕</button></div>';}).join('')+'</div>';
    return html;
  }

  // ---------- Main render ----------
  function render(){
    var titleEl = document.getElementById('app-title');
    if(titleEl){
      var nm = state.settings && state.settings.tripName ? state.settings.tripName : 'Namibia & Botswana';
      if(nm.indexOf(' & ')!==-1){
        var parts = nm.split(' & ');
        titleEl.innerHTML = escapeAttr(parts[0]) + ' <em>&</em> ' + escapeAttr(parts.slice(1).join(' & '));
      } else {
        titleEl.textContent = nm;
      }
      document.title = 'Reisekasse · ' + nm;
    }
    var main = document.getElementById('main');
    var nav = document.getElementById('nav');
    if(!state.loaded){
      main.innerHTML = '<div class="empty">Lade Reisekasse…</div>';
      nav.innerHTML = '';
      return;
    }
    var html = '';
    if(state.tab==='dashboard') html = renderDashboard();
    else if(state.tab==='form') html = renderForm();
    else if(state.tab==='history') html = renderHistory();
    else if(state.tab==='settlement') html = renderSettlement();
    else if(state.tab==='packing') html = renderPacking();
    else if(state.tab==='checklist') html = renderChecklist();
    else if(state.tab==='stats') html = renderStats();
    else if(state.tab==='trip') html = renderTrip();
    else if(state.tab==='wildlife') html = renderWildlife();
    else if(state.tab==='fuel') html = renderFuel();
    else if(state.tab==='settings') html = renderSettings();
    else if(state.tab==='insurance') html = renderInsurance();
    else html = renderCustomTab(state.tab);
    updateCloudStatusDot();
    var prevScroll = main.scrollTop;
    var tabChanged = (state.tab !== lastRenderedTab);
    main.innerHTML = html;
    nav.innerHTML = renderNav();
    main.scrollTop = tabChanged ? 0 : prevScroll;
    lastRenderedTab = state.tab;
    bindEvents();
  }
  var lastRenderedTab = null;


  function loadReceipt(file){
    if(!file) return;
    if(file.size > 12*1024*1024){ alert('Das Bild ist zu groß. Bitte wähle ein kleineres Foto.'); return; }
    var reader=new FileReader();
    reader.onload=function(ev){
      var img=new Image();
      img.onload=function(){
        var max=1400, scale=Math.min(1,max/Math.max(img.width,img.height));
        var canvas=document.createElement('canvas');
        canvas.width=Math.round(img.width*scale); canvas.height=Math.round(img.height*scale);
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        state.form.receipt=canvas.toDataURL('image/jpeg',0.78);
        render();
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  function bindEvents(){
    if(state.tab==='packing'){
      var pa=document.getElementById('pack-add'); if(pa)pa.addEventListener('click',function(){var t=document.getElementById('pack-text').value.trim();if(!t)return;state.settings.packingEntries.push({id:Date.now(),text:t,category:document.getElementById('pack-cat').value,confirmedBy:[]});persistSettings();render();showToast('Eintrag hinzugefügt');});
      document.querySelectorAll('[data-pack-view]').forEach(function(el){el.addEventListener('click',function(){state.packView=el.getAttribute('data-pack-view');render();});});
      document.querySelectorAll('[data-pack-confirm]').forEach(function(el){el.addEventListener('click',function(){
        var id=Number(el.getAttribute('data-pack-confirm'));
        var person=el.getAttribute('data-pack-person');
        var x=state.settings.packingEntries.find(function(i){return i.id===id;});
        if(!x) return;
        if(!Array.isArray(x.confirmedBy)) x.confirmedBy=[];
        var idx=x.confirmedBy.indexOf(person);
        if(idx===-1) x.confirmedBy.push(person); else x.confirmedBy.splice(idx,1);
        var allConfirmed = updateChecklistSyncFor(x);
        persistSettings();render();
        showToast(allConfirmed ? ('✅ Von allen bestätigt: '+x.text+' · in Checkliste übernommen') : ('Bestätigung zurückgenommen: '+x.text));
      });});
      document.querySelectorAll('[data-pack-alone]').forEach(function(el){el.addEventListener('click',function(){
        var id=Number(el.getAttribute('data-pack-alone'));
        var x=state.settings.packingEntries.find(function(i){return i.id===id;});
        if(!x) return;
        if(x.soloBy){
          x.soloBy=null;
          x.confirmedBy=[];
          updateChecklistSyncFor(x);
          persistSettings();render();
          showToast('Zurückgenommen: '+x.text);
        } else {
          state.packAloneSelecting = id;
          render();
        }
      });});
      document.querySelectorAll('[data-pack-alone-cancel]').forEach(function(el){el.addEventListener('click',function(){
        state.packAloneSelecting = null;
        render();
      });});
      document.querySelectorAll('[data-pack-alone-confirm]').forEach(function(el){el.addEventListener('click',function(){
        var id=Number(el.getAttribute('data-pack-alone-confirm'));
        var person=el.getAttribute('data-pack-alone-person');
        var x=state.settings.packingEntries.find(function(i){return i.id===id;});
        if(!x) return;
        x.soloBy = person;
        x.confirmedBy = [person];
        state.packAloneSelecting = null;
        updateChecklistSyncFor(x);
        persistSettings();render();
        showToast('✅ '+person+' hat es allein erledigt: '+x.text+' · in Checkliste übernommen');
      });});
      document.querySelectorAll('[data-pack-del]').forEach(function(b){b.addEventListener('click',function(){if(confirm('Eintrag löschen?')){var id=Number(b.getAttribute('data-pack-del'));state.settings.packingEntries=state.settings.packingEntries.filter(function(i){return i.id!==id;});if(Array.isArray(state.settings.checklistEntries))state.settings.checklistEntries=state.settings.checklistEntries.filter(function(c){return c.fromPacking!==id;});persistSettings();render();}});});
    }

    if(state.tab==='checklist'){
      var ca=document.getElementById('check-add');if(ca)ca.addEventListener('click',function(){
        var t=document.getElementById('check-text').value.trim();if(!t)return;
        var cat=document.getElementById('check-cat').value;
        if(state.editingChecklistId){
          var ex=state.settings.checklistEntries.find(function(e){return e.id===state.editingChecklistId;});
          if(ex){ ex.text=t; ex.category=cat; }
          state.editingChecklistId=null;
          persistSettings();render();showToast('Aufgabe aktualisiert');
        } else {
          state.settings.checklistEntries.push({id:Date.now(),text:t,category:cat,confirmedBy:[]});
          persistSettings();render();showToast('Aufgabe hinzugefügt');
        }
      });
      var checkCancel=document.getElementById('check-cancel');
      if(checkCancel) checkCancel.addEventListener('click',function(){ state.editingChecklistId=null; render(); });
      document.querySelectorAll('[data-check-edit]').forEach(function(b){b.addEventListener('click',function(){
        state.editingChecklistId=Number(b.getAttribute('data-check-edit'));
        render();
      });});
      document.querySelectorAll('[data-check-view]').forEach(function(el){el.addEventListener('click',function(){state.checkView=el.getAttribute('data-check-view');render();});});
      document.querySelectorAll('[data-check-confirm]').forEach(function(el){el.addEventListener('click',function(){
        var id=Number(el.getAttribute('data-check-confirm'));
        var person=el.getAttribute('data-check-person');
        var x=state.settings.checklistEntries.find(function(i){return i.id===id;});
        if(!x) return;
        if(!Array.isArray(x.confirmedBy)) x.confirmedBy=[];
        var idx=x.confirmedBy.indexOf(person);
        if(idx===-1) x.confirmedBy.push(person); else x.confirmedBy.splice(idx,1);
        x.done = x.soloBy ? x.confirmedBy.indexOf(x.soloBy)!==-1 : PAYERS.every(function(p){return x.confirmedBy.indexOf(p)!==-1;});
        persistSettings();render();
        showToast(x.done ? ('✅ Eingepackt bestätigt: '+x.text) : ('Bestätigung zurückgenommen: '+x.text));
      });});
      document.querySelectorAll('[data-check-alone]').forEach(function(el){el.addEventListener('click',function(){
        var id=Number(el.getAttribute('data-check-alone'));
        var x=state.settings.checklistEntries.find(function(i){return i.id===id;});
        if(!x) return;
        if(!Array.isArray(x.confirmedBy)) x.confirmedBy=[];
        var isFullyConfirmed = PAYERS.every(function(p){return x.confirmedBy.indexOf(p)!==-1;});
        x.confirmedBy = isFullyConfirmed ? [] : PAYERS.slice();
        x.done = !isFullyConfirmed;
        persistSettings();render();
        showToast(isFullyConfirmed ? ('Zurückgenommen: '+x.text) : ('✅ Alleine erledigt: '+x.text));
      });});
      document.querySelectorAll('[data-check-del]').forEach(function(b){b.addEventListener('click',function(){var id=Number(b.getAttribute('data-check-del'));state.settings.checklistEntries=state.settings.checklistEntries.filter(function(i){return i.id!==id;});if(state.editingChecklistId===id)state.editingChecklistId=null;persistSettings();render();});});

        var startVal=startEl.value, endVal=endEl.value;

        state.settings.tripEnd = endVal;

      });
      var editEntryForConfirm = state.editingTripId ? state.settings.itineraryEntries.find(function(e){return e.id===state.editingTripId;}) : null;
      var selectedTripConfirm = editEntryForConfirm ? (editEntryForConfirm.confirmation||null) : null;
      var tripConfirmBtn=document.getElementById('trip-confirm-btn'), tripConfirmInput=document.getElementById('trip-confirm-input');
      if(tripConfirmBtn&&tripConfirmInput) tripConfirmBtn.addEventListener('click',function(){tripConfirmInput.click();});
      if(tripConfirmInput) tripConfirmInput.addEventListener('change',function(){
        var file=tripConfirmInput.files[0];if(!file)return;
        var r=new FileReader();
        r.onload=function(ev){
          var im=new Image();
          im.onload=function(){
            var max=1400,sc=Math.min(1,max/Math.max(im.width,im.height));

            selectedTripConfirm=c.toDataURL('image/jpeg',.75);
            document.getElementById('trip-confirm-preview').innerHTML='<div style="position:relative;margin-top:10px;"><img src="'+selectedTripConfirm+'" style="width:100%;max-height:220px;object-fit:contain;border-radius:9px;display:block"><button type="button" id="trip-confirm-clear" style="position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:50%;background:var(--red);color:#fff;border:none;font-size:14px;">✕</button></div>';
            var clr=document.getElementById('trip-confirm-clear');
            if(clr) clr.addEventListener('click',function(){selectedTripConfirm=null;tripConfirmInput.value='';document.getElementById('trip-confirm-preview').innerHTML='';});
          };
          im.src=ev.target.result;
        };
        r.readAsDataURL(file);
      });
      var ts=document.getElementById('trip-save');
      if(ts)ts.addEventListener('click',function(){
        var title=document.getElementById('trip-title').value.trim();
        if(!title){document.getElementById('trip-title').focus();return;}
        var dStart=document.getElementById('trip-date').value;
        var dEndEl=document.getElementById('trip-date-end');
        var dEnd=dEndEl.value || dStart;
        if(dEnd < dStart){ showToast('Enddatum liegt vor dem Startdatum'); dEndEl.style.borderColor='var(--red)'; return; }
        var vals={date:dStart,dateEnd:dEnd,type:document.getElementById('trip-type').value,title:title,place:document.getElementById('trip-place').value.trim(),note:document.getElementById('trip-note').value.trim(),confirmation:selectedTripConfirm};
        if(state.editingTripId){
          var ex=state.settings.itineraryEntries.find(function(e){return e.id===state.editingTripId;});
          if(ex) Object.assign(ex,vals);
          state.editingTripId=null;
          persistSettings();render();showToast('Etappe aktualisiert');

  function saveForm(){
    var f = state.form;
    if(!f.amount || Number(f.amount) <= 0){
      var amtEl = document.getElementById('f-amount');
      if(amtEl){ amtEl.style.borderColor = 'var(--red)'; amtEl.focus(); }
      return;
    }
    if(state.editingId !== null){
      var exp = state.expenses.find(function(e){return e.id===state.editingId;});
      if(exp){
        exp.category = f.category; exp.description = f.description; exp.amount = Number(f.amount);
        exp.currency = f.currency; exp.payer = f.payer; exp.date = f.date; exp.type = f.type; exp.receipt = f.receipt || null;
        exp.note = f.note || '';
      }
      state.editingId = null;
    } else {
      state.expenses.push({
        id: Date.now(),
        category: f.category, description: f.description, amount: Number(f.amount),
        currency: f.currency, payer: f.payer, date: f.date, type: f.type, receipt: f.receipt || null,
        note: f.note || ''
      });
    }
    persist();
    state.form = blankForm();
    state.tab = 'history';
    render();
  }

  // ---------- Dock-Verhalten der Navigationsleiste (blendet bei Inaktivität aus) ----------
  var navHideTimer = null;
  function showNav(){
    var n = document.getElementById('nav');
    if(n) n.classList.remove('nav-hidden');
    scheduleNavHide();
  }
  function scheduleNavHide(){
    clearTimeout(navHideTimer);
    navHideTimer = setTimeout(function(){
      var n = document.getElementById('nav');
      if(n) n.classList.add('nav-hidden');
    }, 3200);
  }

  // ---------- Kleiner Speicherstatus-Punkt neben der Überschrift ----------
  function updateCloudStatusDot(){
    var dot = document.getElementById('cloud-dot');
    if(!dot) return;
    if(lastCloudError){
      dot.style.background = '#c0392b';
      dot.style.boxShadow = '0 0 8px rgba(192,57,43,.75)';
    } else if(lastCloudSuccessAt){
      dot.style.background = '#27ae60';
      dot.style.boxShadow = '0 0 8px rgba(39,174,96,.75)';
    } else {
      dot.style.background = '#888';
      dot.style.boxShadow = 'none';
    }
  }
  // ---------- Doppeltipp setzt Zoom wieder zurück ----------
  (function initDoubleTapZoomReset(){
    function resetZoom(){
      var meta = document.querySelector('meta[name="viewport"]');
      if(!meta) return;
      var original = meta.getAttribute('content');
      meta.setAttribute('content', original + ', maximum-scale=1.0');
      setTimeout(function(){ meta.setAttribute('content', original); }, 350);
    }
    var lastTapTime = 0;
    document.addEventListener('touchend', function(){
      var now = Date.now();
      if(now - lastTapTime < 300){
        resetZoom();
        lastTapTime = 0;
      } else {
        lastTapTime = now;
      }
    }, {passive:true});
  })();

  (function initCloudDot(){
    var dot = document.getElementById('cloud-dot');
    var detail = document.getElementById('cloud-dot-detail');
    if(!dot || !detail) return;
    dot.addEventListener('click', function(){
      if(detail.style.display === 'none' || !detail.style.display){
        if(lastCloudError){
          detail.style.background = 'rgba(192,57,43,.9)';
          detail.style.color = '#fff';
          detail.textContent = '☁️❌ ' + lastCloudError;
        } else if(lastCloudSuccessAt){
          detail.style.background = 'rgba(39,174,96,.9)';
          detail.style.color = '#fff';
          detail.textContent = '☁️✅ Zuletzt erfolgreich gespeichert: ' + lastCloudSuccessAt;
        } else {
          detail.style.background = 'rgba(120,120,120,.9)';
          detail.style.color = '#fff';
          detail.textContent = 'Noch kein Speichervorgang seit dem Öffnen der App.';
        }
        detail.style.display = 'block';
      } else {
        detail.style.display = 'none';
      }
    });
  })();

  (function initDock(){
    var mainEl = document.getElementById('main');
    var handle = document.getElementById('nav-handle');
    var fab = document.getElementById('fab-add');
    if(mainEl){
      mainEl.addEventListener('touchstart', showNav, {passive:true});
      mainEl.addEventListener('scroll', showNav, {passive:true});
      mainEl.addEventListener('click', showNav);

      // Wisch links/rechts wechselt zwischen den Kategorien in der Leiste
      var swipeStartX = null, swipeStartY = null, swipeStartTime = 0;
      mainEl.addEventListener('touchstart', function(ev){
        var t = ev.touches[0];
        swipeStartX = t.clientX; swipeStartY = t.clientY; swipeStartTime = Date.now();
      }, {passive:true});
      mainEl.addEventListener('touchend', function(ev){
        if(swipeStartX===null) return;
        var t = ev.changedTouches[0];
        var dx = t.clientX - swipeStartX;
        var dy = t.clientY - swipeStartY;
        var dt = Date.now() - swipeStartTime;
        swipeStartX = null;
        if(dt > 700) return;
        if(Math.abs(dx) < 70 || Math.abs(dx) < Math.abs(dy) * 1.4) return;
        var tabs = getActiveTabs();
        var idx = tabs.findIndex(function(t2){return t2.key===state.tab;});
        if(idx===-1) return;
        var nextIdx = dx < 0 ? idx+1 : idx-1;
        if(nextIdx < 0 || nextIdx >= tabs.length) return;
        state.tab = tabs[nextIdx].key;
        if(state.tab==='form' && state.editingId===null) state.form = blankForm();
        state.pendingDelete = null;
        render();
        showNav();
        setTimeout(function(){ if(window.keepActiveVisible) window.keepActiveVisible(); }, 50);
      }, {passive:true});
    }
    if(handle){
      handle.addEventListener('click', showNav);
    }
    // Wisch-nach-oben vom unteren Bildschirmrand blendet die Leiste ein
    var touchStartY = null, touchStartX = null;
    document.addEventListener('touchstart', function(ev){
      var t = ev.touches[0];
      if(t.clientY > window.innerHeight - 40){
        touchStartY = t.clientY; touchStartX = t.clientX;
      } else {
        touchStartY = null;
      }
    }, {passive:true});
    document.addEventListener('touchmove', function(ev){
      if(touchStartY===null) return;
      var t = ev.touches[0];
      if(touchStartY - t.clientY > 18){
        showNav();
        touchStartY = null;
      }
    }, {passive:true});
    if(fab){
      fab.addEventListener('click', function(){
        state.tab = 'form';
        if(state.editingId===null) state.form = blankForm();
        state.pendingDelete = null;
        render();
        showNav();
      });
    }
    scheduleNavHide();
  })();

  render();
  loadExpenses();
})();
</script>
